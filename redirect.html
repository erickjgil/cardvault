<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CardVault — Connecting...</title>
<style>
  body{font-family:sans-serif;background:#0f0f11;color:#f0f0f5;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;gap:16px}
  .spinner{width:36px;height:36px;border:3px solid #333;border-top-color:#f5c542;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:14px;color:#888;margin:0}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Connecting eBay to CardVault...</p>
<script>
  // Send the full URL (including auth code) back to the CardVault window
  try {
    if (window.opener) {
      window.opener.postMessage(window.location.href, '*');
      setTimeout(() => window.close(), 500);
    } else {
      document.querySelector('p').textContent = 'Auth complete — you can close this window.';
    }
  } catch(e) {
    document.querySelector('p').textContent = 'Done — close this window and return to CardVault.';
  }
</script>
</body>
</html>
